---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: audit-vision
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: audit-vision
type: Opaque
stringData:
  POSTGRES_USER: auditvision
  POSTGRES_PASSWORD: changeme
  POSTGRES_DB: auditvision
  DATABASE_URL: postgres://auditvision:changeme@postgres:5432/auditvision?sslmode=disable
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: audit-vision
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15
        envFrom:
        - secretRef:
            name: postgres-secret
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        readinessProbe:
          exec:
            command: [pg_isready, -U, auditvision]
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: audit-vision
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
