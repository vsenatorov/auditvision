# ServiceAccount for the UI pod
apiVersion: v1
kind: ServiceAccount
metadata:
  name: audit-ui
  namespace: audit-vision
---
# Allow UI to read and patch the alerter ConfigMap and Secret
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: audit-ui-configmap
  namespace: audit-vision
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["audit-alerter-config"]
    verbs: ["get", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["audit-alerter-secret"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: audit-ui-configmap
  namespace: audit-vision
subjects:
  - kind: ServiceAccount
    name: audit-ui
    namespace: audit-vision
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: audit-ui-configmap
