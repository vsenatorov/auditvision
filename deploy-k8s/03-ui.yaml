---
# Secret for basic auth (username/password login)
# Change values before applying
apiVersion: v1
kind: Secret
metadata:
  name: audit-ui-basic-secret
  namespace: audit-vision
type: Opaque
stringData:
  AUTH_BASIC_USER: "admin"
  AUTH_BASIC_PASS: "changeme"
---
# Secret for OAuth client (not used on plain k8s, kept for compatibility)
apiVersion: v1
kind: Secret
metadata:
  name: audit-ui-oauth-secret
  namespace: audit-vision
type: Opaque
stringData:
  AUTH_CLIENT_SECRET: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-ui
  namespace: audit-vision
  labels:
    app: audit-ui
    app.kubernetes.io/part-of: audit-vision
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audit-ui
  template:
    metadata:
      labels:
        app: audit-ui
    spec:
      serviceAccountName: audit-ui
      containers:
      - name: ui
        image: docker.io/hybrid2k3/audit-ui:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
        env:
        - name: LISTEN_ADDR
          value: ":8080"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: DATABASE_URL
        # ── Auth ──────────────────────────────────────────────────────────
        - name: AUTH_ENABLED
          value: "true"
        - name: AUTH_OCP_URL
          value: ""        # leave empty on plain k8s — OCP OAuth not available
        - name: AUTH_CLIENT_ID
          value: "audit-radar"
        - name: AUTH_REDIRECT_URL
          value: ""
        - name: AUTH_ADMIN_GROUP
          value: "audit-radar-admins"
        - name: AUTH_EDITOR_GROUP
          value: "audit-radar-editors"
        - name: AUTH_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: audit-ui-oauth-secret
              key: AUTH_CLIENT_SECRET
              optional: true
        # ── Basic auth fallback ───────────────────────────────────────────
        - name: AUTH_BASIC_USER
          valueFrom:
            secretKeyRef:
              name: audit-ui-basic-secret
              key: AUTH_BASIC_USER
              optional: true
        - name: AUTH_BASIC_PASS
          valueFrom:
            secretKeyRef:
              name: audit-ui-basic-secret
              key: AUTH_BASIC_PASS
              optional: true
        - name: AUTH_BASIC_ROLE
          value: "admin"
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 200m
            memory: 128Mi
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
---
apiVersion: v1
kind: Service
metadata:
  name: audit-ui
  namespace: audit-vision
spec:
  selector:
    app: audit-ui
  ports:
  - port: 8080
    targetPort: 8080
---
# k8s Ingress (replaces OpenShift Route)
# Traefik is built into k3s — no extra setup needed
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: audit-ui
  namespace: audit-vision
spec:
  rules:
  - host: audit.192.168.10.30.nip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: audit-ui
            port:
              number: 8080
