---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: audit-collector
  namespace: audit-vision
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: audit-vision-collector
rules:
- apiGroups: [apps]
  resources: [deployments, replicasets, statefulsets, daemonsets]
  verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: audit-vision-collector
subjects:
- kind: ServiceAccount
  name: audit-collector
  namespace: audit-vision
roleRef:
  kind: ClusterRole
  name: audit-vision-collector
  apiGroup: rbac.authorization.k8s.io
---
# Collector in plain HTTP mode (no TLS for k8s/k3s)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-collector
  namespace: audit-vision
  labels:
    app: audit-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audit-collector
  template:
    metadata:
      labels:
        app: audit-collector
    spec:
      serviceAccountName: audit-collector
      containers:
      - name: collector
        image: docker.io/hybrid2k3/audit-collector:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
        env:
        - name: LISTEN_ADDR
          value: ":8443"   # main listener (no TLS cert = plain HTTP on 8443)
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: DATABASE_URL
        - name: RETENTION_DAYS
          value: "30"
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: audit-collector
  namespace: audit-vision
spec:
  selector:
    app: audit-collector
  ports:
  - name: http
    port: 8080
    targetPort: 8080
