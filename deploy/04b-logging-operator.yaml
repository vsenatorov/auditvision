# Red Hat OpenShift Logging Operator installation.
#
# Must be applied BEFORE 05-clf.yaml.
# After applying, wait for the operator to reach Succeeded status (~2-3 min):
#
#   oc get csv -n openshift-logging -w
#
# Then verify the CLF CRD is available:
#
#   oc api-resources | grep -i logforwarder
---
apiVersion: v1
kind: Namespace
metadata:
  name: openshift-logging
  annotations:
    openshift.io/node-selector: ""
  labels:
    openshift.io/cluster-monitoring: "true"
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: openshift-logging
  namespace: openshift-logging
spec:
  targetNamespaces:
  - openshift-logging
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: cluster-logging
  namespace: openshift-logging
spec:
  channel: stable-6.4
  name: cluster-logging
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  startingCSV: cluster-logging.v6.4.2
  installPlanApproval: Automatic
