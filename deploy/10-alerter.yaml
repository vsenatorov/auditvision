---
# ── ConfigMap — edit this to configure alerts without rebuilding ──────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: audit-alerter-config
  namespace: audit-vision
data:
  # ── Slack ─────────────────────────────────────────────────────────────────
  # Get from: Slack → Apps → Incoming Webhooks → Add to Slack
  ALERT_SLACK_WEBHOOK: ""   # e.g. https://hooks.slack.com/services/T.../B.../xxx

  # ── Email (SMTP) ──────────────────────────────────────────────────────────
  ALERT_SMTP_HOST: ""       # e.g. smtp.gmail.com
  ALERT_SMTP_PORT: "587"
  ALERT_SMTP_USER: ""       # e.g. alerts@yourcompany.com
  ALERT_EMAIL_FROM: ""      # e.g. audit-radar@yourcompany.com
  ALERT_EMAIL_TO: ""        # e.g. security@yourcompany.com,ops@yourcompany.com

  # ── Rules ─────────────────────────────────────────────────────────────────
  ALERT_ON_HIGH: "true"           # alert when Granite scores event as HIGH risk
  ALERT_ON_HUMAN_DELETE: "true"   # alert when human actor runs DELETE

  # ── Timing ────────────────────────────────────────────────────────────────
  ALERT_POLL_INTERVAL: "30s"      # how often to check for new events

---
# ── Secret — SMTP password (keep out of ConfigMap) ───────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: audit-alerter-secret
  namespace: audit-vision
type: Opaque
stringData:
  ALERT_SMTP_PASS: ""   # your SMTP password or app token

---
# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-alerter
  namespace: audit-vision
  labels:
    app: audit-alerter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audit-alerter
  template:
    metadata:
      labels:
        app: audit-alerter
    spec:
      containers:
        - name: alerter
          image: docker.io/hybrid2k3/audit-alerter:latest
          imagePullPolicy: Always
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL
          envFrom:
            - configMapRef:
                name: audit-alerter-config
            - secretRef:
                name: audit-alerter-secret
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
