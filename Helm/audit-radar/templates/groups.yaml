---
# OCP Groups for audit-radar role mapping
# Add users after install: oc adm groups add-users audit-radar-admins <username>
apiVersion: user.openshift.io/v1
kind: Group
metadata:
  name: {{ .Values.ui.auth.adminGroup }}
  labels:
    {{- include "audit-radar.labels" . | nindent 4 }}
users: []
---
apiVersion: user.openshift.io/v1
kind: Group
metadata:
  name: {{ .Values.ui.auth.editorGroup }}
  labels:
    {{- include "audit-radar.labels" . | nindent 4 }}
users: []
---
# Group for users that get WriteRequestBodies audit level
apiVersion: user.openshift.io/v1
kind: Group
metadata:
  name: {{ .Values.auditPolicy.writeRequestBodiesGroup }}
  labels:
    {{- include "audit-radar.labels" . | nindent 4 }}
users: {{- toYaml .Values.auditPolicy.writeRequestBodiesUsers | nindent 0 }}
