# audit-radar Helm chart values
# OpenShift only — for Kubernetes/k3s see deploy-k8s/

# ── Namespace ─────────────────────────────────────────────────────────────────
namespace: audit-vision

# ── Images ────────────────────────────────────────────────────────────────────
images:
  ui:
    repository: docker.io/hybrid2k3/audit-ui
    tag: latest
    pullPolicy: Always
  collector:
    repository: docker.io/hybrid2k3/audit-collector
    tag: latest
    pullPolicy: Always
  analyzer:
    repository: docker.io/hybrid2k3/audit-analyzer
    tag: latest
    pullPolicy: Always
  alerter:
    repository: docker.io/hybrid2k3/audit-alerter
    tag: latest
    pullPolicy: Always
  postgres:
    repository: registry.redhat.io/rhel9/postgresql-15
    tag: latest

# ── PostgreSQL ────────────────────────────────────────────────────────────────
postgres:
  user: auditvision
  database: auditvision
  storage: 10Gi

# ── Collector ─────────────────────────────────────────────────────────────────
collector:
  retentionDays: 30         # set to 0 to disable retention cleanup

# ── UI / Auth ─────────────────────────────────────────────────────────────────
ui:
  auth:
    enabled: true
    # OCP OAuth2 — leave ocpUrl empty for auto-detection from cluster well-known endpoint
    ocpUrl: ""
    clientId: "audit-radar"
    redirectUrl: ""         # leave empty — auto-built from request host
    adminGroup: "audit-radar-admins"
    editorGroup: "audit-radar-editors"
    # clientSecret and basicPass are auto-generated on first install and stable across upgrades
    basicUser: "admin"
    basicRole: "admin"

# ── Ollama / Analyzer ─────────────────────────────────────────────────────────
ollama:
  enabled: true
  model: "granite3.2:2b"
  storage: 10Gi
  storageClassName: "ocs-external-storagecluster-ceph-rbd"
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "4"
      memory: 6Gi

analyzer:
  enabled: true
  intervalSec: 30
  batchSize: 20

# ── Alerter ───────────────────────────────────────────────────────────────────
alerter:
  enabled: true
  slack:
    webhookUrl: ""          # https://hooks.slack.com/services/...
  smtp:
    host: ""
    port: "587"
    user: ""
    from: ""
    to: ""
    password: ""
  rules:
    alertOnHigh: "true"
    alertOnHumanDelete: "true"
  pollInterval: "30s"

# ── CLF (Cluster Log Forwarder) ───────────────────────────────────────────────
clf:
  enabled: true
  # Install OpenShift Logging operator subscription
  installOperator: true
  channel: "stable-6.4"
  startingCSV: "cluster-logging.v6.4.2"

# ── Audit policy ──────────────────────────────────────────────────────────────
auditPolicy:
  # Triggers a rolling restart of kube-apiserver pods (~5-10 min)
  enabled: true
  writeRequestBodiesGroup: "audit-write-users"
  writeRequestBodiesUsers:
    - admin
