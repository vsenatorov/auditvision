---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "audit-radar.labels" . | nindent 4 }}
data:
  vector.yaml: |
    sources:
      k3s_audit:
        type: file
        include:
          - {{ .Values.vector.auditLogPath }}
        read_from: beginning
        line_delimiter: "\n"

    transforms:
      parse_json:
        type: remap
        inputs: [k3s_audit]
        source: |
          parsed, err = parse_json(.message)
          if err == null {
            . = parsed
          }

    sinks:
      collector:
        type: http
        inputs: [parse_json]
        uri: http://audit-collector.{{ .Values.namespace }}.svc.cluster.local:8080/vector-sink
        method: post
        batch:
          max_events: 100
          timeout_secs: 5
        encoding:
          codec: json
        framing:
          method: bytes
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: vector
  namespace: {{ .Values.namespace }}
  labels:
    app: vector
    {{- include "audit-radar.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: vector
  template:
    metadata:
      labels:
        app: vector
    spec:
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        effect: NoSchedule
      containers:
      - name: vector
        image: timberio/vector:0.39.0-alpine
        args: ["--config", "/etc/vector/vector.yaml"]
        volumeMounts:
        - name: config
          mountPath: /etc/vector
        - name: audit-log
          mountPath: /var/log
          readOnly: true
        - name: vector-data
          mountPath: /var/lib/vector
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
      volumes:
      - name: config
        configMap:
          name: vector-config
      - name: audit-log
        hostPath:
          path: /var/log
          type: Directory
      - name: vector-data
        emptyDir: {}
