---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: audit-collector
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "audit-radar.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: audit-vision-collector
  labels:
    {{- include "audit-radar.labels" . | nindent 4 }}
rules:
- apiGroups: [apps]
  resources: [deployments, replicasets, statefulsets, daemonsets]
  verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: audit-vision-collector
  labels:
    {{- include "audit-radar.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: audit-collector
  namespace: {{ .Values.namespace }}
roleRef:
  kind: ClusterRole
  name: audit-vision-collector
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-collector
  namespace: {{ .Values.namespace }}
  labels:
    app: audit-collector
    {{- include "audit-radar.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audit-collector
  template:
    metadata:
      labels:
        app: audit-collector
    spec:
      serviceAccountName: audit-collector
      containers:
      - name: collector
        image: {{ .Values.images.collector.repository }}:{{ .Values.images.collector.tag }}
        imagePullPolicy: {{ .Values.images.collector.pullPolicy }}
        ports:
        - name: http
          containerPort: 8080
        env:
        - name: LISTEN_ADDR
          value: ":8080"
        - name: VECTOR_ADDR
          value: ":8080"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: DATABASE_URL
        - name: RETENTION_DAYS
          value: {{ .Values.collector.retentionDays | quote }}
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 20
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
---
apiVersion: v1
kind: Service
metadata:
  name: audit-collector
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: audit-collector
  ports:
  - name: http
    port: 8080
    targetPort: 8080
